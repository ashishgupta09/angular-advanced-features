<div class="card">
  @if (imageUrl) {
    <div class="card-image">
      <img [src]="imageUrl" [alt]="title" />
    </div>
  }

  @if (title || subtitle) {
    <div class="card-header">
      <h3>{{ title }}</h3>
      @if (subtitle) {
        <p>{{ subtitle }}</p>
      }
    </div>
  }

  <div class="card-body">
    <ng-content></ng-content>
  </div>
</div>
