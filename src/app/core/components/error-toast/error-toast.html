@if (currentError) {
  <div class="toast-wrapper" [class.toast-visible]="visible" [class.toast-hidden]="!visible" role="alert" aria-live="assertive">
    <div class="toast">
      <!-- Icon -->
      <div class="toast-icon">
        <svg lucideInfo aria-hidden="true"></svg>
      </div>

      <!-- Content -->
      <div class="toast-content">
        <p class="toast-title">
          @if (currentError.statusCode) {
            Error {{ currentError.statusCode }}
          } @else {
            Something went wrong
          }
        </p>
        <p class="toast-message">{{ currentError.message }}</p>
      </div>

      <!-- Close button -->
      <button class="toast-close" (click)="dismiss()" aria-label="Dismiss error">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Progress bar showing auto-dismiss countdown -->
    <div class="toast-progress" [class.toast-progress-run]="visible"></div>
  </div>
}
