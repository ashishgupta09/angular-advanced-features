@if (isOpen()) {
  <!-- Backdrop — clicking it closes the modal -->
  <div
    class="modal-backdrop"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title()"
    (click)="onBackdropClick($event)"
  >
    <!-- Dialog panel -->
    <div class="modal-panel modal-{{ size() }}" role="document">

      <!-- Header -->
      <div class="modal-header">
        <h2 class="modal-title">{{ title() }}</h2>
        <button
          class="modal-close-btn"
          type="button"
          aria-label="Close dialog"
          (click)="close()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            width="18" height="18" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- Body — projected via #modalBody template -->
      <div class="modal-body">
        @if (bodyTpl) {
          <ng-container [ngTemplateOutlet]="bodyTpl" />
        }
      </div>

      <!-- Footer — projected via #modalFooter template (optional) -->
      @if (footerTpl) {
        <div class="modal-footer">
          <ng-container [ngTemplateOutlet]="footerTpl" />
        </div>
      }

    </div>
  </div>
}
